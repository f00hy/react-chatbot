<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input type="text" placeholder="Ask Chatbot anything..." />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage(props) {
        const message = props.message;
        const sender = props.sender;

        if (sender === "user") {
          return (
            <div>
              {message}
              <img src="assets/user.png" width="50" />
            </div>
          );
        }
        else if (sender === "robot") {
          return (
            <div>
              <img src="assets/robot.png" width="50" />
              {message}
            </div>
          );
        }
      }

      const app = (
        <>
          <ChatInput />
          <ChatMessage message="Hi Chatbot" sender="user" />
          <ChatMessage message="Hi User" sender="robot" />
        </>
      );

      const container = document.querySelector('.container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
